---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servergroups.nlboperator.alibabacloud.com
spec:
  group: nlboperator.alibabacloud.com
  names:
    kind: ServerGroup
    listKind: ServerGroupList
    plural: servergroups
    singular: servergroup
    shortNames:
      - sg
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: ServerGroupId
          type: string
          jsonPath: .status.serverGroupId
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - region
                - vpcId
                - serverGroupName
                - serverGroupType
                - protocol
              properties:
                region:
                  type: string
                  description: AliCloud region
                vpcId:
                  type: string
                  description: VPC ID
                serverGroupName:
                  type: string
                  description: Cloud-side ServerGroup name
                serverGroupType:
                  type: string
                  description: ServerGroup type Ip/Instance
                protocol:
                  type: string
                  description: ServerGroup-level protocol TCP/UDP/TCPSSL
                scheduler:
                  type: string
                healthCheck:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    healthCheckConnectPort:
                      type: integer
                      format: int32
                    healthCheckConnectTimeout:
                      type: integer
                      format: int32
                    healthyThreshold:
                      type: integer
                      format: int32
                    unhealthyThreshold:
                      type: integer
                      format: int32
                    healthCheckInterval:
                      type: integer
                      format: int32
                  required:
                    - enabled
            status:
              type: object
              properties:
                serverGroupId:
                  type: string
                phase:
                  type: string
                message:
                  type: string
