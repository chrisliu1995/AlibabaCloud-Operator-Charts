---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: portallocations.nlbpool.kruise.io
spec:
  group: nlbpool.kruise.io
  names:
    kind: PortAllocation
    listKind: PortAllocationList
    plural: portallocations
    singular: portallocation
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.labels.game\.kruise\.io/nlb-pool-name
      name: Pool
      type: string
    - jsonPath: .metadata.labels.game\.kruise\.io/slot-status
      name: Status
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.boundPod
      name: BoundPod
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: PortAllocation 代表一个游戏服务器 Pod 的完整公网端口槽位
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PortAllocationSpec 定义端口分配槽位的期望状态
            properties:
              boundGSS:
                description: BoundGSS 绑定的 GameServerSet 名称 (Plugin 填入)
                type: string
              boundPod:
                description: BoundPod 绑定的 Pod 名称 (Plugin 填入)
                type: string
              boundPodIP:
                description: BoundPodIP 绑定的 Pod IP (Plugin 填入)
                type: string
              enabled:
                description: Enabled 网络启用/禁用开关
                type: boolean
              nlbEndpoints:
                description: NLBEndpoints 各 ISP 线路的 NLB + Listener 信息
                items:
                  description: NLBEndpoint 描述一条 ISP 线路上的 NLB 及其 Listener 信息
                  properties:
                    eip:
                      description: EIP 公网 IP
                      type: string
                    ispType:
                      description: ISPType ISP 类型 (BGP/CTC/CUC/CMC)
                      type: string
                    listeners:
                      description: Listeners 该 NLB 上的监听器列表
                      items:
                        description: ListenerInfo 描述一个预创建的 Listener
                        properties:
                          listenerId:
                            description: ListenerId 监听器 ID
                            type: string
                          listenerPort:
                            description: ListenerPort 分配的监听端口
                            format: int32
                            type: integer
                          protocol:
                            description: Protocol 协议 (TCP/UDP)
                            type: string
                          serverGroupRef:
                            description: ServerGroupRef 引用的 ServerGroup ID (跨 NLB
                              共享)
                            type: string
                        required:
                        - listenerId
                        - listenerPort
                        - protocol
                        - serverGroupRef
                        type: object
                      type: array
                    nlbId:
                      description: NLBId NLB 实例 ID
                      type: string
                  required:
                  - eip
                  - ispType
                  - listeners
                  - nlbId
                  type: object
                type: array
              serverGroups:
                description: ServerGroups 每逻辑端口一个 SG (Protocol=TCP_UDP)，跨所有 NLB 共享
                items:
                  description: ServerGroupInfo 描述一个预创建的 ServerGroup
                  properties:
                    logicalPort:
                      description: LogicalPort 对应的容器逻辑端口
                      format: int32
                      type: integer
                    serverGroupId:
                      description: ServerGroupId 预创建的空 SG ID (Protocol=TCP_UDP)
                      type: string
                    serverGroupName:
                      description: ServerGroupName SG 名称
                      type: string
                  required:
                  - logicalPort
                  - serverGroupId
                  - serverGroupName
                  type: object
                type: array
              targetPorts:
                description: TargetPorts 容器端口列表，对应 ServerGroups 顺序 (Plugin 填入)
                items:
                  format: int32
                  type: integer
                type: array
            required:
            - enabled
            - nlbEndpoints
            - serverGroups
            type: object
          status:
            description: PortAllocationStatus 定义端口分配槽位的观测状态
            properties:
              externalAddresses:
                description: ExternalAddresses Bound 后填充，供 Plugin 读取
                items:
                  description: ExternalAddress 对外暴露的地址信息
                  properties:
                    ip:
                      description: IP 公网 EIP 地址
                      type: string
                    ispType:
                      description: ISPType ISP 类型
                      type: string
                    ports:
                      description: Ports 该 ISP 线路上的端口列表
                      items:
                        description: PortInfo 端口信息
                        properties:
                          port:
                            description: Port 监听端口号
                            format: int32
                            type: integer
                          protocol:
                            description: Protocol 协议 (TCP/UDP)
                            type: string
                        required:
                        - port
                        - protocol
                        type: object
                      type: array
                  required:
                  - ip
                  - ispType
                  - ports
                  type: object
                type: array
              message:
                description: Message 错误或状态信息
                type: string
              operationJobId:
                description: OperationJobId 当前异步操作的 JobId (用于轮询)
                type: string
              phase:
                description: 'Phase 当前阶段: Available / Binding / Bound / Releasing
                  / Disabled'
                type: string
            required:
            - phase
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
