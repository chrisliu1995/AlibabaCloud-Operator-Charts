{{- if .Values.components.eip.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: eip-operator-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "eip-operator.labels" . | nindent 4 }}
data:
  ctrl-config.yaml: |
    regionID: {{ .Values.global.alibabacloud.region }}
---
apiVersion: v1
kind: Secret
metadata:
  name: eip-operator-credential
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "eip-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  ctrl-secret.yaml: |
    accessKeyID: {{ .Values.global.alibabacloud.accessKeyId }}
    accessKeySecret: {{ .Values.global.alibabacloud.accessKeySecret }}
    regionID: {{ .Values.global.alibabacloud.region }}
{{- end }}
