{{- if and .Values.components.eip.enabled .Values.eipOperator.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eip-operator.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "eip-operator.labels" . | nindent 4 }}
  {{- with .Values.eipOperator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
