{{- if and .Values.components.eip.enabled .Values.eipOperator.webhook.enabled (not .Values.eipOperator.webhook.certManager.enabled) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: eip-operator-webhook-cert-patcher
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "eip-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: eip-operator-webhook-cert-patcher
    spec:
      serviceAccountName: {{ include "eip-operator.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
      - name: patch
        image: registry.cn-hangzhou.aliyuncs.com/google_containers/kube-webhook-certgen:v1.3.0
        imagePullPolicy: IfNotPresent
        args:
        - patch
        - --webhook-name=eip-operator-validating-webhook-configuration
        - --namespace={{ .Values.global.namespace }}
        - --secret-name={{ .Values.eipOperator.webhook.certificate.secretName }}
        - --patch-validating=true
        - --patch-mutating=false
{{- end }}
