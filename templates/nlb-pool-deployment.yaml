{{- if .Values.components.nlbPool.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlb-pool-operator
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nlb-pool-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.nlbPoolOperator.replicaCount }}
  selector:
    matchLabels:
      {{- include "nlb-pool-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nlb-pool-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nlb-pool-operator.serviceAccountName" . }}
      containers:
      - name: manager
        image: "{{ .Values.nlbPoolOperator.image.registry | default .Values.global.imageRegistry }}/{{ .Values.nlbPoolOperator.image.repository }}:{{ .Values.nlbPoolOperator.image.tag }}"
        imagePullPolicy: {{ .Values.nlbPoolOperator.image.pullPolicy }}
        command:
        - /manager
        args:
        {{- if .Values.nlbPoolOperator.controller }}
        {{- if .Values.nlbPoolOperator.controller.kubeApiQps }}
        - --kube-api-qps={{ .Values.nlbPoolOperator.controller.kubeApiQps }}
        {{- end }}
        {{- if .Values.nlbPoolOperator.controller.kubeApiBurst }}
        - --kube-api-burst={{ .Values.nlbPoolOperator.controller.kubeApiBurst }}
        {{- end }}
        {{- end }}
        {{- with .Values.nlbPoolOperator.rateLimits }}
        - --add-servers-qps={{ .addServers }}
        - --remove-servers-qps={{ .removeServers }}
        - --create-sg-qps={{ .createSg }}
        - --create-listener-qps={{ .createListener }}
        - --get-listener-qps={{ .getListener }}
        - --delete-listener-qps={{ .deleteListener }}
        - --delete-sg-qps={{ .deleteSg }}
        - --list-listeners-by-port-qps={{ .listListenersByPort }}
        - --list-server-group-servers-qps={{ .listServerGroupServers }}
        - --list-listeners-qps={{ .listListeners }}
        - --get-server-group-attribute-qps={{ .getServerGroupAttribute }}
        - --get-job-status-qps={{ .getJobStatus }}
        {{- end }}
        {{- range .Values.nlbPoolOperator.extraArgs }}
        - {{ . }}
        {{- end }}
        env:
        - name: ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "nlb-pool-operator.serviceAccountName" . }}-credentials
              key: access-key-id
        - name: ACCESS_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "nlb-pool-operator.serviceAccountName" . }}-credentials
              key: access-key-secret
        - name: REGION_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "nlb-pool-operator.serviceAccountName" . }}-credentials
              key: region
        {{- range .Values.nlbPoolOperator.env }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        {{- if .Values.nlbPoolOperator.livenessProbe }}
        livenessProbe:
          {{- toYaml .Values.nlbPoolOperator.livenessProbe | nindent 10 }}
        {{- end }}
        {{- if .Values.nlbPoolOperator.readinessProbe }}
        readinessProbe:
          {{- toYaml .Values.nlbPoolOperator.readinessProbe | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.nlbPoolOperator.resources | nindent 10 }}
      {{- with .Values.nlbPoolOperator.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nlbPoolOperator.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nlbPoolOperator.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
{{- end }}
