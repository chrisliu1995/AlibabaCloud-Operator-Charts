{{- if and .Values.components.nlbPool.enabled .Values.nlbPoolOperator.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nlb-pool-operator.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "nlb-pool-operator.labels" . | nindent 4 }}
  {{- with .Values.nlbPoolOperator.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
