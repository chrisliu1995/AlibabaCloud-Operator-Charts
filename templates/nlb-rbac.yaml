{{- if .Values.components.nlb.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "nlb-operator.serviceAccountName" . }}-role
  labels:
    {{- include "nlb-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - services
  - endpoints
  - events
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
- apiGroups:
  - ""
  resources:
  - services/status
  verbs:
  - update
  - patch
- apiGroups:
  - apps
  resources:
  - deployments
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - get
  - create
  - update
  - patch
- apiGroups:
  - nlboperator.alibabacloud.com
  resources:
  - nlbs
  - nlbs/status
  - nlbs/finalizers
  - servergroups
  - servergroups/status
  - servergroups/finalizers
  - listeners
  - listeners/status
  - listeners/finalizers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "nlb-operator.serviceAccountName" . }}-rolebinding
  labels:
    {{- include "nlb-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "nlb-operator.serviceAccountName" . }}-role
subjects:
- kind: ServiceAccount
  name: {{ include "nlb-operator.serviceAccountName" . }}
  namespace: {{ .Values.global.namespace }}
{{- end }}
