# 示例：仅安装 NLB Operator
global:
  alibabacloud:
    accessKeyId: "your-access-key-id"
    accessKeySecret: "your-access-key-secret"
    region: "cn-hangzhou"

components:
  nlb:
    enabled: true
  eip:
    enabled: false
  nlbPool:
    enabled: false

nlbOperator:
  replicaCount: 2
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
